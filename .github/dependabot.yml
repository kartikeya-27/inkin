# Dependabot config — automated dependency PRs.
#
# Why grouped + weekly: an indie React library doesn't need 30 individual
# patch PRs per week. Grouping minor/patch updates into one PR per
# dependency-type per week keeps the review surface small while still
# catching security + ecosystem updates promptly. Major bumps stay
# ungrouped (one PR each) because they can carry breaking changes that
# deserve their own review + changelog discussion.
#
# Why monthly for GitHub Actions: workflow actions move slower than npm
# packages, and a monthly cadence is enough for the deprecation cycles
# we care about (GitHub announces these months in advance — see the
# Node 24 opt-in we did in 0.4.1 for the actions/* v4 line).
#
# Limit of 5 open PRs per ecosystem: forces us to clear the queue
# before Dependabot opens new ones. Keeps the dashboard from drowning
# if a busy week hits.

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      # Group all non-major production deps into one weekly PR.
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      # Same for dev dependencies (testing, build tooling, linter).
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    # Majors stay outside the groups — they get their own PRs so a
    # potential breaking-change review isn't bundled with routine bumps.
    # Specific majors that require coordinated upgrades across multiple
    # packages (or carry known breaking changes for our usage) are
    # ignored at the major-version level so dependabot doesn't keep
    # re-opening already-rejected PRs every week.
    ignore:
      # React 18 → 19 took deliberate planning; don't let dependabot
      # propose React 20+ on autopilot. Re-evaluate manually when the
      # next major arrives.
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      # TypeScript 6 tightened TS2882 for plain `*.css` side-effect
      # imports — our `src/index.ts` line `import './renderer/styles.css'`
      # would need an ambient `declare module '*.css'` (which this PR
      # adds to `src/css-modules.d.ts` preemptively) plus a coordinated
      # check across the rest of the codebase for other TS 6 strictness
      # changes. Re-evaluate manually when scheduling the TS 6 upgrade
      # work.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # @vitejs/plugin-react 6 requires Vite 6+ in lockstep (it imports
      # `vite/internal` which doesn't exist in Vite 5). Until we plan a
      # Vite 6 migration, don't accept the plugin major. When ready,
      # bump both manually in the same PR.
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]
      # Vite 6 is the dependent half of the @vitejs/plugin-react upgrade
      # above; pinning both prevents Dependabot from proposing one
      # without the other.
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    groups:
      # All actions updates land in one PR per month.
      github-actions:
        patterns:
          - "*"
