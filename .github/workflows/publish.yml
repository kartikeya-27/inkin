name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

# Required for npm provenance via OIDC
permissions:
  id-token: write
  contents: read

# Force GitHub's JS-action runner to use Node 24 ahead of GitHub's
# 2026-09-16 deprecation deadline. See the same env block in ci.yml.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  publish:
    name: Publish to npm with provenance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Verify before publish (lint + typecheck + tests + build + size)
        run: pnpm verify

      # Belt-and-braces: ensure npm CLI is >= 11.5.1 (minimum version supporting
      # Trusted Publishing via OIDC). Node 24 ships with npm 11.x by default,
      # so this is usually a no-op — kept as insurance against future runner drift.
      - name: Ensure npm >= 11.5.1 (Trusted Publishing requirement)
        run: npm install -g npm@latest

      # Authentication is via OIDC (Trusted Publishing) — no NPM_TOKEN required.
      # The `id-token: write` workflow permission above + the npm-side Trusted
      # Publisher config for this repo + this workflow filename combine to prove
      # identity. Provenance attestation auto-attaches.
      - name: Publish (npm publish --provenance --access public via OIDC)
        run: npm publish --provenance --access public

      - name: Audit signatures (post-publish)
        run: npm audit signatures
