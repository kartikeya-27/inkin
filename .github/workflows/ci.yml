name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default: workflow steps can only read the repo, not write.
# If a step ever needs to (e.g., upload a release artifact), it's overridden inline.
permissions:
  contents: read

jobs:
  verify:
    name: verify (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22', '24']
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Lint (biome)
        run: pnpm lint

      - name: Typecheck (tsc --noEmit)
        run: pnpm typecheck

      - name: Unit tests (vitest)
        run: pnpm test

      - name: Build (tsdown + emit JSON Schema)
        run: pnpm build

      - name: Bundle size (size-limit)
        run: pnpm size

      # Type-export correctness (arethetypeswrong) is deferred until 0.2.0.
      # attw requires either a `main` field or a `.` entry in exports; the 0.1.0
      # package intentionally has neither (only `./schema`). When 0.2.0 adds the
      # React surface at `.`, attw returns as a CI gate. Run ad-hoc with `pnpm attw`.

      - name: Publish dry-run (npm pack)
        run: npm pack --dry-run
