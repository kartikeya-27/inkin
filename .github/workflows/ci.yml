name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default: workflow steps can only read the repo, not write.
# If a step ever needs to (e.g., upload a release artifact), it's overridden inline.
permissions:
  contents: read

jobs:
  verify:
    name: verify (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22', '24']
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Lint (biome)
        run: pnpm lint

      - name: Typecheck library (tsc --noEmit)
        run: pnpm typecheck

      - name: Unit tests (vitest)
        run: pnpm test

      # Build must run before the examples typecheck: the examples app resolves
      # `@inkin/core` through the workspace link, but `package.json#exports.types`
      # points at `./dist/index.d.ts`, which only exists after a build. Locally
      # this passes off a stale dist; in CI on a fresh checkout, the dist isn't
      # there yet — so we build first and let the examples typecheck against the
      # freshly-emitted types (which is also the more realistic consumer check).
      - name: Build (tsdown + emit JSON Schema)
        run: pnpm build

      - name: Typecheck examples (proves consumer-side types resolve)
        run: pnpm --filter @inkin/examples exec tsc -b --noEmit

      - name: Bundle size (size-limit)
        run: pnpm size

      # `pnpm attw` (arethetypeswrong) is intentionally NOT a CI gate:
      # `@arethetypeswrong/core`'s tarball extractor uses fflate's streaming
      # Gunzip and keeps only the LAST chunk callback, which is empty for any
      # tarball that decompresses past one chunk (~64 kB). Reproducible end-to-
      # end on both Windows + Node 24 (locally) AND Ubuntu + Node 22/24 (CI),
      # against both this package's tarball and the published
      # `@inkin/core@0.1.0`. Not platform-specific — a real upstream bug.
      # Until it's fixed, type-export correctness is covered by the
      # examples-typecheck step above (proves consumer-side resolution) plus
      # the `npm pack` dry-run below. The `pnpm attw` script remains
      # available for ad-hoc local runs once the upstream fix lands.

      - name: Publish dry-run (npm pack)
        run: npm pack --dry-run
